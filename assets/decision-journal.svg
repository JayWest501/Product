<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg"><rect width="900" height="520" fill="#101010"/><rect x="34" y="34" width="832" height="452" rx="28" fill="#F7F4ED"/><text x="74" y="92" font-family="Arial" font-size="34" font-weight="900" fill="#101010">Decision Journal</text><text x="74" y="124" font-family="Arial" font-size="14" fill="#70695F">How I think through product tradeoffs.</text><rect x="74" y="166" width="752" height="84" rx="20" fill="#FFFFFF" stroke="#D8D0C0"/><text x="104" y="202" font-family="Arial" font-size="17" font-weight="900" fill="#101010">Should the BRQ wizard autosave?</text><text x="104" y="226" font-family="Arial" font-size="13" fill="#70695F">Decision: defer v1, add draft recovery in v2 after measuring abandonment.</text><rect x="74" y="270" width="752" height="84" rx="20" fill="#FFFFFF" stroke="#D8D0C0"/><text x="104" y="306" font-family="Arial" font-size="17" font-weight="900" fill="#101010">Should clients see technical fields?</text><text x="104" y="330" font-family="Arial" font-size="13" fill="#70695F">Decision: hide by default, reveal only when the ERP path requires it.</text><rect x="74" y="374" width="752" height="84" rx="20" fill="#FFFFFF" stroke="#D8D0C0"/><text x="104" y="410" font-family="Arial" font-size="17" font-weight="900" fill="#101010">Should PMs edit submissions before kickoff?</text><text x="104" y="434" font-family="Arial" font-size="13" fill="#70695F">Decision: yes, but keep an audit trail to preserve source-of-truth integrity.</text></svg>